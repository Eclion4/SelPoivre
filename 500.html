<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erreur serveur — Sel & Poivre</title>
    <meta name="robots" content="noindex">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23C4311B'/><text y='22' x='16' text-anchor='middle' font-size='18' fill='white'>🍴</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;500;600&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/sp.css">
    <script>tailwind.config={theme:{extend:{colors:{'sp':{50:'#FEF4F2',500:'#C4311B',600:'#A42618'},'or':{500:'#C4892A'},'ivoire':'#F8F5EF','encre':'#18130F'},fontFamily:{'display':['Playfair Display','serif'],'body':['Inter','sans-serif'],'handwrite':['Caveat','cursive']}}}}</script>
</head>
<body class="bg-ivoire font-body text-encre min-h-screen flex flex-col items-center justify-center px-4">

    <div class="text-center max-w-lg mx-auto">
        <div class="relative inline-block mb-8">
            <div class="text-[120px] leading-none select-none">🔥</div>
            <div class="absolute -bottom-2 -right-4 bg-sp-500 text-white text-2xl font-display font-black w-16 h-16 rounded-2xl flex items-center justify-center rotate-12 shadow-xl">500</div>
        </div>

        <span class="font-handwrite text-2xl text-sp-500 block mb-2">Quelque chose a brûlé…</span>
        <h1 class="text-5xl font-display font-bold mb-4">Erreur serveur</h1>
        <p class="text-gray-500 text-lg mb-2">Une erreur inattendue s'est produite côté serveur.</p>
        <p class="text-gray-400 text-sm mb-10">Notre équipe a été notifiée. Réessayez dans quelques instants.</p>

        <div class="flex flex-col sm:flex-row gap-3 justify-center">
            <button onclick="location.reload()" class="px-8 py-3 bg-gradient-to-r from-sp-500 to-sp-600 text-white rounded-full font-semibold shadow-lg hover:shadow-sp-500/30 hover:-translate-y-0.5 transition-all">
                Réessayer
            </button>
            <a href="/" class="px-8 py-3 border-2 border-encre/10 rounded-full font-semibold hover:bg-white transition-all">
                Retour à l'accueil
            </a>
        </div>

        <p class="mt-10 text-xs text-gray-300 font-mono">Erreur 500</p>
    </div>

</body>
</html>
