<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Recettes — Admin Sel & Poivre</title>
    <link rel="stylesheet" href="../css/sp.css">
<style>
  body { font-family: 'Inter', sans-serif; background: #F8F7F4; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  .sidebar-link { display:flex; align-items:center; gap:12px; padding:10px 16px; border-radius:12px; color:#cbd5e1; transition:all .2s; font-size:0.875rem; font-weight:500; }
  .sidebar-link:hover { background:#16213E; color:white; }
  .sidebar-link.active { background:#C4311B; color:white; }
  .badge-pending { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:9999px; font-size:0.75rem; font-weight:600; background:#FEF3C7; color:#92400E; }
  .badge-published { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:9999px; font-size:0.75rem; font-weight:600; background:#D1FAE5; color:#065F46; }
  .badge-rejected { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:9999px; font-size:0.75rem; font-weight:600; background:#FEE2E2; color:#991B1B; }
  .filter-tab { padding:8px 16px; border-radius:9999px; font-size:0.8125rem; font-weight:500; color:#64748b; background:white; border:1px solid #e2e8f0; cursor:pointer; transition:all .15s; }
  .filter-tab:hover { background:#f8fafc; }
  .filter-tab.active { background:#C4311B; color:white; border-color:#C4311B; }
  #sidebar { transition: transform 0.3s ease; }
  @media (max-width: 1023px) { #sidebar { position:fixed; top:0; left:0; bottom:0; z-index:50; transform:translateX(-100%); } #sidebar.open { transform:translateX(0); } }
  .recipe-row { transition: background-color .15s; }
  .recipe-row:hover { background:#F9FAFB; }
  .modal-overlay { backdrop-filter: blur(4px); }
  .toast { position:fixed; bottom:20px; right:20px; z-index:100; padding:14px 20px; border-radius:12px; box-shadow:0 10px 25px rgba(0,0,0,0.15); display:flex; align-items:center; gap:10px; font-weight:500; animation: slideIn .3s ease; }
  @keyframes slideIn { from { transform: translateX(100%); opacity:0; } to { transform: translateX(0); opacity:1; } }
</style>
</head>
<body class="min-h-screen">

<script>
  (function () {
    const stored = localStorage.getItem('sp_user');
    const user = stored ? JSON.parse(stored) : null;
    if (!user || user.role !== 'admin') window.location.href = 'login.html';
  })();
</script>

<div class="flex h-screen overflow-hidden">

  <aside id="sidebar" class="w-64 flex-shrink-0 bg-sidebar flex flex-col overflow-y-auto">
    <div class="px-5 py-6 border-b border-white/10">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-sp rounded-xl flex items-center justify-center">
          <svg class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8 2 4 6 4 12c0 4 2 7 5 9h6c3-2 5-5 5-9 0-6-4-10-8-10z"/></svg>
        </div>
        <div>
          <div class="text-white font-bold text-sm">Sel &amp; Poivre Admin</div>
          <div class="text-slate-400 text-xs">Panneau de contrôle</div>
        </div>
      </div>
    </div>

    <nav class="flex-1 px-3 py-4 space-y-1">
      <p class="px-4 pb-2 text-xs font-semibold text-slate-500 uppercase tracking-wider">Principal</p>
      <a href="index.html" class="sidebar-link">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Tableau de bord
      </a>
      <a href="recettes.html" class="sidebar-link active">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
        Recettes
        <span id="navPendingCount" class="ml-auto bg-amber-500 text-white text-xs font-bold px-1.5 py-0.5 rounded-full hidden">0</span>
      </a>
      <a href="utilisateurs.html" class="sidebar-link">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        Utilisateurs
      </a>

      <p class="px-4 pt-4 pb-2 text-xs font-semibold text-slate-500 uppercase tracking-wider">Système</p>
      <a href="../index.html" target="_blank" class="sidebar-link">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
        Voir le site
      </a>
    </nav>

    <div class="px-4 py-4 border-t border-white/10">
      <div class="flex items-center gap-3">
        <div id="adminAvatar" class="w-8 h-8 rounded-full bg-sp flex items-center justify-center text-white text-xs font-bold flex-shrink-0">A</div>
        <div class="min-w-0">
          <div id="adminName" class="text-white text-sm font-medium truncate">Admin</div>
          <div id="adminEmail" class="text-slate-400 text-xs truncate">—</div>
        </div>
        <button onclick="window.SP.logout()" title="Déconnexion" class="ml-auto text-slate-500 hover:text-red-400 transition-colors flex-shrink-0">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
    <header class="bg-white border-b border-slate-200 px-6 py-4 flex items-center gap-4 flex-shrink-0">
      <button id="sidebarToggle" class="lg:hidden text-slate-500 hover:text-slate-900">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <div>
        <h1 class="text-lg font-semibold text-slate-900">Recettes</h1>
        <p class="text-xs text-slate-500"><span id="totalCount">—</span> au total</p>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto p-6 space-y-4">

      <!-- Filters + search -->
      <div class="flex flex-col sm:flex-row gap-3 items-start sm:items-center justify-between">
        <div class="flex flex-wrap gap-2">
          <button class="filter-tab active" data-filter="all">Toutes <span class="ml-1.5 px-1.5 py-0.5 bg-white/20 rounded text-xs" data-count="all">—</span></button>
          <button class="filter-tab" data-filter="pending">En attente <span class="ml-1.5 px-1.5 py-0.5 bg-amber-100 text-amber-700 rounded text-xs" data-count="pending">—</span></button>
          <button class="filter-tab" data-filter="published">Publiées <span class="ml-1.5 px-1.5 py-0.5 bg-green-100 text-green-700 rounded text-xs" data-count="published">—</span></button>
          <button class="filter-tab" data-filter="rejected">Refusées <span class="ml-1.5 px-1.5 py-0.5 bg-red-100 text-red-700 rounded text-xs" data-count="rejected">—</span></button>
        </div>
        <div class="relative w-full sm:w-64">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <input id="searchInput" type="text" placeholder="Rechercher…" class="w-full pl-10 pr-3 py-2 bg-white border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-sp focus:ring-1 focus:ring-sp">
        </div>
      </div>

      <!-- Bulk actions (hidden until selection) -->
      <div id="bulkBar" class="hidden bg-sp/10 border border-sp/30 rounded-xl px-4 py-3 flex items-center gap-3 text-sm">
        <span class="font-semibold text-sp"><span id="bulkCount">0</span> sélectionnée(s)</span>
        <button id="bulkApprove" class="ml-auto px-3 py-1.5 bg-green-600 text-white rounded-lg text-xs font-semibold hover:bg-green-700">✓ Valider</button>
        <button id="bulkReject"  class="px-3 py-1.5 bg-red-600 text-white rounded-lg text-xs font-semibold hover:bg-red-700">✗ Refuser</button>
        <button id="bulkClear"   class="text-slate-500 hover:text-slate-900 text-xs">Tout désélectionner</button>
      </div>

      <!-- Recipes list -->
      <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wide">
              <tr>
                <th class="px-4 py-3 w-8"><input id="selectAll" type="checkbox" class="w-4 h-4 accent-sp"></th>
                <th class="px-4 py-3 text-left">Recette</th>
                <th class="px-4 py-3 text-left hidden md:table-cell">Auteur</th>
                <th class="px-4 py-3 text-left hidden lg:table-cell">Date</th>
                <th class="px-4 py-3 text-left">Statut</th>
                <th class="px-4 py-3 text-right">Actions</th>
              </tr>
            </thead>
            <tbody id="recipesBody" class="divide-y divide-slate-100">
              <tr><td colspan="6" class="px-4 py-12 text-center text-slate-400 text-sm">Chargement…</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- Toast container -->
<div id="toastContainer"></div>

<!-- Confirm modal -->
<div id="confirmModal" class="hidden fixed inset-0 bg-black/40 modal-overlay z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl max-w-md w-full p-6">
        <h3 id="confirmTitle" class="font-bold text-lg mb-2">Confirmer</h3>
        <p id="confirmMsg" class="text-sm text-slate-600 mb-5">…</p>
        <div class="flex gap-3 justify-end">
            <button id="confirmCancel" class="px-4 py-2 border border-slate-200 rounded-lg text-sm font-semibold text-slate-600 hover:bg-slate-50">Annuler</button>
            <button id="confirmOk" class="px-4 py-2 rounded-lg text-sm font-semibold text-white">Confirmer</button>
        </div>
    </div>
</div>

<script src="../js/auth-ui.js"></script>
<script>
(function () {
    const PALETTE = ['#E85D26','#16A34A','#7C3AED','#DB2777','#0284C7','#CA8A04'];
    function colorFor(name){let h=0;for(const c of (name||''))h=(h*31+c.charCodeAt(0))&0xFFFF;return PALETTE[h%PALETTE.length];}
    function initials(name){return (name||'A').trim().split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2);}
    function fmtDate(iso){try{return new Date(iso).toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'});}catch{return '';}}
    function escape(s){return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

    // Sidebar mobile toggle
    document.getElementById('sidebarToggle')?.addEventListener('click', () => {
        document.getElementById('sidebar').classList.toggle('open');
    });

    const u = window.SP && window.SP.user;
    if (u) {
        document.getElementById('adminAvatar').textContent = initials(u.username);
        document.getElementById('adminAvatar').style.background = colorFor(u.username);
        document.getElementById('adminName').textContent  = u.username;
        document.getElementById('adminEmail').textContent = u.email;
    }

    // ── State ──
    let allRecipes = [];
    let activeFilter = 'all';
    let searchQuery = '';
    const selected = new Set();

    // Apply ?status= URL param
    const urlStatus = new URLSearchParams(window.location.search).get('status');
    if (['pending','published','rejected'].includes(urlStatus)) activeFilter = urlStatus;

    // ── Toast ──
    function toast(msg, type = 'success') {
        const el = document.createElement('div');
        const color = type === 'success' ? 'bg-green-600 text-white' : type === 'error' ? 'bg-red-600 text-white' : 'bg-slate-800 text-white';
        el.className = 'toast ' + color;
        el.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="${type==='success' ? 'M5 13l4 4L19 7' : 'M6 18L18 6M6 6l12 12'}"/></svg> ${escape(msg)}`;
        document.getElementById('toastContainer').appendChild(el);
        setTimeout(() => { el.style.opacity = '0'; el.style.transform = 'translateX(20px)'; el.style.transition = 'all .25s'; }, 2500);
        setTimeout(() => el.remove(), 2800);
    }

    // ── Confirm modal ──
    function confirmAction({ title, msg, btnClass, btnLabel }) {
        return new Promise(resolve => {
            const modal = document.getElementById('confirmModal');
            document.getElementById('confirmTitle').textContent = title;
            document.getElementById('confirmMsg').textContent   = msg;
            const ok = document.getElementById('confirmOk');
            ok.textContent = btnLabel;
            ok.className = 'px-4 py-2 rounded-lg text-sm font-semibold text-white ' + btnClass;
            modal.classList.remove('hidden');

            const cleanup = (val) => {
                modal.classList.add('hidden');
                ok.removeEventListener('click', onOk);
                document.getElementById('confirmCancel').removeEventListener('click', onCancel);
                resolve(val);
            };
            const onOk = () => cleanup(true);
            const onCancel = () => cleanup(false);
            ok.addEventListener('click', onOk);
            document.getElementById('confirmCancel').addEventListener('click', onCancel);
        });
    }

    // ── Render ──
    function statusBadge(s) {
        const map = {
            published: ['badge-published', 'Publiée'],
            pending:   ['badge-pending',   'En attente'],
            rejected:  ['badge-rejected',  'Refusée'],
        };
        const v = map[s] || [];
        return `<span class="${v[0]||''}">${v[1]||s}</span>`;
    }

    function actionButtons(r) {
        const view = `<a href="../recette-detail.html?slug=${r.slug}" target="_blank" class="px-2.5 py-1 bg-slate-50 text-slate-600 border border-slate-200 rounded-md text-xs font-semibold hover:bg-slate-100 transition-colors">Voir</a>`;
        const edit = `<a href="../publier.html?slug=${r.slug}&from=admin" class="px-2.5 py-1 bg-blue-50 text-blue-600 border border-blue-200 rounded-md text-xs font-semibold hover:bg-blue-100 transition-colors">Modifier</a>`;
        const del  = `<button data-id="${r.id}" data-title="${escape(r.title)}" class="js-delete px-2.5 py-1 bg-red-50 text-red-600 border border-red-200 rounded-md text-xs font-semibold hover:bg-red-100 transition-colors">Supprimer</button>`;

        if (r.status === 'pending') {
            const approve = `<button data-id="${r.id}" class="js-approve px-2.5 py-1 bg-green-600 text-white border border-green-600 rounded-md text-xs font-semibold hover:bg-green-700">✓ Valider</button>`;
            const reject  = `<button data-id="${r.id}" class="js-reject px-2.5 py-1 bg-red-600 text-white border border-red-600 rounded-md text-xs font-semibold hover:bg-red-700">✗ Refuser</button>`;
            return `${approve}${reject}${view}${del}`;
        } else if (r.status === 'rejected') {
            const restore = `<button data-id="${r.id}" class="js-approve px-2.5 py-1 bg-green-50 text-green-700 border border-green-200 rounded-md text-xs font-semibold hover:bg-green-100">↻ Republier</button>`;
            return `${restore}${view}${del}`;
        } else {
            const reject = `<button data-id="${r.id}" class="js-reject px-2.5 py-1 bg-amber-50 text-amber-700 border border-amber-200 rounded-md text-xs font-semibold hover:bg-amber-100">Dépublier</button>`;
            return `${reject}${view}${edit}${del}`;
        }
    }

    function row(r) {
        const img = r.image_url || '/assets/recipes/_default.jpg';
        const sel = selected.has(r.id) ? 'checked' : '';
        return `
        <tr class="recipe-row" data-row-id="${r.id}">
            <td class="px-4 py-3"><input type="checkbox" data-id="${r.id}" class="js-row-check w-4 h-4 accent-sp" ${sel}></td>
            <td class="px-4 py-3">
                <div class="flex items-center gap-3">
                    <img src="${img}" alt="" class="w-10 h-10 rounded-lg object-cover flex-shrink-0">
                    <div class="min-w-0">
                        <p class="font-semibold text-slate-900 truncate">${escape(r.title)}</p>
                        <p class="text-xs text-slate-500 truncate">${escape(r.category || '')}</p>
                    </div>
                </div>
            </td>
            <td class="px-4 py-3 hidden md:table-cell text-slate-700">${escape(r.author_name || 'Communauté')}</td>
            <td class="px-4 py-3 hidden lg:table-cell text-slate-500 text-xs">${fmtDate(r.created_at)}</td>
            <td class="px-4 py-3">${statusBadge(r.status)}</td>
            <td class="px-4 py-3 text-right">
                <div class="inline-flex flex-wrap gap-1.5 justify-end">${actionButtons(r)}</div>
            </td>
        </tr>`;
    }

    function getFiltered() {
        let list = activeFilter === 'all' ? allRecipes : allRecipes.filter(r => r.status === activeFilter);
        if (searchQuery.trim()) {
            const q = searchQuery.trim().toLowerCase();
            list = list.filter(r =>
                (r.title || '').toLowerCase().includes(q) ||
                (r.author_name || '').toLowerCase().includes(q) ||
                (r.category || '').toLowerCase().includes(q)
            );
        }
        return list;
    }

    function render() {
        const tbody = document.getElementById('recipesBody');
        const list  = getFiltered();
        if (list.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="px-4 py-12 text-center text-slate-400">Aucune recette dans cette vue.</td></tr>';
        } else {
            tbody.innerHTML = list.map(row).join('');
            tbody.querySelectorAll('.js-approve').forEach(b => b.addEventListener('click', () => approveOne(+b.dataset.id)));
            tbody.querySelectorAll('.js-reject').forEach(b => b.addEventListener('click', () => rejectOne(+b.dataset.id)));
            tbody.querySelectorAll('.js-delete').forEach(b => b.addEventListener('click', () => deleteOne(+b.dataset.id, b.dataset.title)));
            tbody.querySelectorAll('.js-row-check').forEach(c => c.addEventListener('change', () => {
                const id = +c.dataset.id;
                if (c.checked) selected.add(id); else selected.delete(id);
                refreshBulk();
            }));
        }
        // Counts
        const counts = {
            all: allRecipes.length,
            pending:   allRecipes.filter(r => r.status === 'pending').length,
            published: allRecipes.filter(r => r.status === 'published').length,
            rejected:  allRecipes.filter(r => r.status === 'rejected').length,
        };
        document.querySelectorAll('[data-count]').forEach(el => el.textContent = counts[el.dataset.count]);
        document.getElementById('totalCount').textContent = counts.all;
        const navBadge = document.getElementById('navPendingCount');
        if (counts.pending > 0) {
            navBadge.textContent = counts.pending;
            navBadge.classList.remove('hidden');
        } else navBadge.classList.add('hidden');
    }

    function refreshBulk() {
        const bar = document.getElementById('bulkBar');
        if (selected.size === 0) {
            bar.classList.add('hidden');
            document.getElementById('selectAll').checked = false;
        } else {
            bar.classList.remove('hidden');
            document.getElementById('bulkCount').textContent = selected.size;
        }
    }

    // ── API actions ──
    async function loadRecipes() {
        try {
            const res = await fetch('../api/recipes.php?action=all', { credentials: 'include' });
            const data = await res.json();
            if (data.error) throw new Error(data.error);
            allRecipes = data.recipes || [];
            render();
            // Activate the right tab from URL
            document.querySelectorAll('.filter-tab').forEach(t => t.classList.toggle('active', t.dataset.filter === activeFilter));
        } catch (e) {
            document.getElementById('recipesBody').innerHTML = `<tr><td colspan="6" class="px-4 py-12 text-center text-red-500">Erreur: ${escape(e.message)}</td></tr>`;
        }
    }

    async function approveOne(id) {
        const r = allRecipes.find(x => x.id == id);
        const ok = await confirmAction({
            title: 'Valider la recette',
            msg: `"${r?.title || ''}" sera visible publiquement et notifiée comme publiée.`,
            btnClass: 'bg-green-600 hover:bg-green-700',
            btnLabel: '✓ Valider',
        });
        if (!ok) return;
        try {
            const res = await fetch('../api/recipes.php?action=approve&id=' + id, { method: 'POST', credentials: 'include' });
            const d = await res.json();
            if (!d.success) throw new Error(d.error || 'Erreur');
            toast('Recette publiée', 'success');
            // Animate row out
            const rowEl = document.querySelector(`tr[data-row-id="${id}"]`);
            if (rowEl) { rowEl.style.transition = 'opacity .3s'; rowEl.style.opacity = '0'; }
            await new Promise(r => setTimeout(r, 300));
            await loadRecipes();
        } catch (e) { toast(e.message, 'error'); }
    }

    async function rejectOne(id) {
        const r = allRecipes.find(x => x.id == id);
        const ok = await confirmAction({
            title: 'Refuser la recette',
            msg: `"${r?.title || ''}" sera marquée comme refusée et retirée du site public.`,
            btnClass: 'bg-red-600 hover:bg-red-700',
            btnLabel: '✗ Refuser',
        });
        if (!ok) return;
        try {
            const res = await fetch('../api/recipes.php?action=reject&id=' + id, { method: 'POST', credentials: 'include' });
            const d = await res.json();
            if (!d.success) throw new Error(d.error || 'Erreur');
            toast('Recette refusée', 'success');
            const rowEl = document.querySelector(`tr[data-row-id="${id}"]`);
            if (rowEl) { rowEl.style.transition = 'opacity .3s'; rowEl.style.opacity = '0'; }
            await new Promise(r => setTimeout(r, 300));
            await loadRecipes();
        } catch (e) { toast(e.message, 'error'); }
    }

    async function deleteOne(id, title) {
        const ok = await confirmAction({
            title: 'Supprimer définitivement',
            msg: `"${title}" sera supprimée définitivement de la base. Cette action est irréversible.`,
            btnClass: 'bg-red-700 hover:bg-red-800',
            btnLabel: 'Supprimer',
        });
        if (!ok) return;
        try {
            const res = await fetch('../api/recipes.php?action=delete&id=' + id, { method: 'DELETE', credentials: 'include' });
            const d = await res.json();
            if (!d.success) throw new Error(d.error || 'Erreur');
            toast('Recette supprimée', 'success');
            await loadRecipes();
        } catch (e) { toast(e.message, 'error'); }
    }

    // ── Bulk actions ──
    document.getElementById('bulkApprove').addEventListener('click', async () => {
        if (selected.size === 0) return;
        const ok = await confirmAction({
            title: `Valider ${selected.size} recette(s)`,
            msg: 'Toutes les recettes sélectionnées passeront en publié.',
            btnClass: 'bg-green-600 hover:bg-green-700',
            btnLabel: '✓ Valider tout',
        });
        if (!ok) return;
        for (const id of [...selected]) {
            try {
                await fetch('../api/recipes.php?action=approve&id=' + id, { method: 'POST', credentials: 'include' });
            } catch {}
        }
        toast(selected.size + ' recette(s) validée(s)', 'success');
        selected.clear();
        refreshBulk();
        await loadRecipes();
    });

    document.getElementById('bulkReject').addEventListener('click', async () => {
        if (selected.size === 0) return;
        const ok = await confirmAction({
            title: `Refuser ${selected.size} recette(s)`,
            msg: 'Les recettes sélectionnées seront marquées comme refusées.',
            btnClass: 'bg-red-600 hover:bg-red-700',
            btnLabel: '✗ Refuser tout',
        });
        if (!ok) return;
        for (const id of [...selected]) {
            try {
                await fetch('../api/recipes.php?action=reject&id=' + id, { method: 'POST', credentials: 'include' });
            } catch {}
        }
        toast(selected.size + ' recette(s) refusée(s)', 'success');
        selected.clear();
        refreshBulk();
        await loadRecipes();
    });

    document.getElementById('bulkClear').addEventListener('click', () => {
        selected.clear();
        document.querySelectorAll('.js-row-check').forEach(c => c.checked = false);
        refreshBulk();
    });

    document.getElementById('selectAll').addEventListener('change', function () {
        const list = getFiltered();
        if (this.checked) list.forEach(r => selected.add(r.id));
        else selected.clear();
        document.querySelectorAll('.js-row-check').forEach(c => c.checked = this.checked);
        refreshBulk();
    });

    // ── Filters ──
    document.querySelectorAll('.filter-tab').forEach(t => t.addEventListener('click', () => {
        document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
        t.classList.add('active');
        activeFilter = t.dataset.filter;
        selected.clear();
        refreshBulk();
        render();
    }));

    let searchTimer;
    document.getElementById('searchInput').addEventListener('input', function () {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => { searchQuery = this.value; render(); }, 200);
    });

    loadRecipes();
})();
</script>

</body>
</html>
