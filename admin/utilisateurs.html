<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Utilisateurs — Admin Sel & Poivre</title>
    <link rel="stylesheet" href="../css/sp.css">
<style>
  body { font-family: 'Inter', sans-serif; background: #F8F7F4; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  .sidebar-link { display:flex; align-items:center; gap:12px; padding:10px 16px; border-radius:12px; color:#cbd5e1; transition:all .2s; font-size:0.875rem; font-weight:500; }
  .sidebar-link:hover { background:#16213E; color:white; }
  .sidebar-link.active { background:#C4311B; color:white; }
  .badge-admin { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:9999px; font-size:0.75rem; font-weight:600; background:#FEE2E2; color:#991B1B; }
  .badge-user  { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:9999px; font-size:0.75rem; font-weight:600; background:#E0E7FF; color:#3730A3; }
  .badge-active   { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:9999px; font-size:0.75rem; font-weight:600; background:#D1FAE5; color:#065F46; }
  .badge-inactive { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:9999px; font-size:0.75rem; font-weight:600; background:#F1F5F9; color:#475569; }
  #sidebar { transition: transform 0.3s ease; }
  @media (max-width: 1023px) { #sidebar { position:fixed; top:0; left:0; bottom:0; z-index:50; transform:translateX(-100%); } #sidebar.open { transform:translateX(0); } }
  .user-row { transition: background-color .15s; }
  .user-row:hover { background:#F9FAFB; }
  .modal-overlay { backdrop-filter: blur(4px); }
  .toast { position:fixed; bottom:20px; right:20px; z-index:100; padding:14px 20px; border-radius:12px; box-shadow:0 10px 25px rgba(0,0,0,0.15); display:flex; align-items:center; gap:10px; font-weight:500; animation: slideIn .3s ease; }
  @keyframes slideIn { from { transform: translateX(100%); opacity:0; } to { transform: translateX(0); opacity:1; } }
</style>
</head>
<body class="min-h-screen">

<script>
  (function () {
    const stored = localStorage.getItem('sp_user');
    const user = stored ? JSON.parse(stored) : null;
    if (!user || user.role !== 'admin') window.location.href = 'login.html';
  })();
</script>

<div class="flex h-screen overflow-hidden">

  <aside id="sidebar" class="w-64 flex-shrink-0 bg-sidebar flex flex-col overflow-y-auto">
    <div class="px-5 py-6 border-b border-white/10">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-sp rounded-xl flex items-center justify-center">
          <svg class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8 2 4 6 4 12c0 4 2 7 5 9h6c3-2 5-5 5-9 0-6-4-10-8-10z"/></svg>
        </div>
        <div>
          <div class="text-white font-bold text-sm">Sel &amp; Poivre Admin</div>
          <div class="text-slate-400 text-xs">Panneau de contrôle</div>
        </div>
      </div>
    </div>
    <nav class="flex-1 px-3 py-4 space-y-1">
      <p class="px-4 pb-2 text-xs font-semibold text-slate-500 uppercase tracking-wider">Principal</p>
      <a href="index.html" class="sidebar-link">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Tableau de bord
      </a>
      <a href="recettes.html" class="sidebar-link">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
        Recettes
      </a>
      <a href="utilisateurs.html" class="sidebar-link active">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        Utilisateurs
      </a>
      <p class="px-4 pt-4 pb-2 text-xs font-semibold text-slate-500 uppercase tracking-wider">Système</p>
      <a href="../index.html" target="_blank" class="sidebar-link">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
        Voir le site
      </a>
    </nav>
    <div class="px-4 py-4 border-t border-white/10">
      <div class="flex items-center gap-3">
        <div id="adminAvatar" class="w-8 h-8 rounded-full bg-sp flex items-center justify-center text-white text-xs font-bold flex-shrink-0">A</div>
        <div class="min-w-0">
          <div id="adminName"  class="text-white text-sm font-medium truncate">Admin</div>
          <div id="adminEmail" class="text-slate-400 text-xs truncate">—</div>
        </div>
        <button onclick="window.SP.logout()" title="Déconnexion" class="ml-auto text-slate-500 hover:text-red-400 transition-colors flex-shrink-0">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
    <header class="bg-white border-b border-slate-200 px-6 py-4 flex items-center gap-4 flex-shrink-0">
      <button id="sidebarToggle" class="lg:hidden text-slate-500 hover:text-slate-900">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <div>
        <h1 class="text-lg font-semibold text-slate-900">Utilisateurs</h1>
        <p class="text-xs text-slate-500"><span id="totalCount">—</span> au total</p>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto p-6 space-y-4">

      <div class="flex flex-col sm:flex-row gap-3 items-start sm:items-center justify-between">
        <div class="flex flex-wrap gap-2">
          <button class="px-4 py-2 bg-sp text-white rounded-full text-sm font-semibold filter-btn active" data-filter="all">Tous <span class="ml-1.5 px-1.5 py-0.5 bg-white/20 rounded text-xs" data-count="all">—</span></button>
          <button class="px-4 py-2 bg-white border border-slate-200 text-slate-600 rounded-full text-sm font-semibold filter-btn" data-filter="admin">Admins <span class="ml-1.5 px-1.5 py-0.5 bg-red-100 text-red-700 rounded text-xs" data-count="admin">—</span></button>
          <button class="px-4 py-2 bg-white border border-slate-200 text-slate-600 rounded-full text-sm font-semibold filter-btn" data-filter="user">Membres <span class="ml-1.5 px-1.5 py-0.5 bg-blue-100 text-blue-700 rounded text-xs" data-count="user">—</span></button>
          <button class="px-4 py-2 bg-white border border-slate-200 text-slate-600 rounded-full text-sm font-semibold filter-btn" data-filter="inactive">Inactifs <span class="ml-1.5 px-1.5 py-0.5 bg-slate-100 text-slate-600 rounded text-xs" data-count="inactive">—</span></button>
        </div>
        <div class="relative w-full sm:w-64">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <input id="searchInput" type="text" placeholder="Rechercher…" class="w-full pl-10 pr-3 py-2 bg-white border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-sp focus:ring-1 focus:ring-sp">
        </div>
      </div>

      <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wide">
              <tr>
                <th class="px-4 py-3 text-left">Utilisateur</th>
                <th class="px-4 py-3 text-left hidden md:table-cell">Email</th>
                <th class="px-4 py-3 text-left hidden lg:table-cell">Inscription</th>
                <th class="px-4 py-3 text-center">Recettes</th>
                <th class="px-4 py-3 text-left">Rôle</th>
                <th class="px-4 py-3 text-left">Statut</th>
                <th class="px-4 py-3 text-right">Actions</th>
              </tr>
            </thead>
            <tbody id="usersBody" class="divide-y divide-slate-100">
              <tr><td colspan="7" class="px-4 py-12 text-center text-slate-400">Chargement…</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>
</div>

<div id="toastContainer"></div>

<div id="confirmModal" class="hidden fixed inset-0 bg-black/40 modal-overlay z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl max-w-md w-full p-6">
        <h3 id="confirmTitle" class="font-bold text-lg mb-2">Confirmer</h3>
        <p id="confirmMsg" class="text-sm text-slate-600 mb-5">…</p>
        <div class="flex gap-3 justify-end">
            <button id="confirmCancel" class="px-4 py-2 border border-slate-200 rounded-lg text-sm font-semibold text-slate-600 hover:bg-slate-50">Annuler</button>
            <button id="confirmOk" class="px-4 py-2 rounded-lg text-sm font-semibold text-white">Confirmer</button>
        </div>
    </div>
</div>

<script src="../js/auth-ui.js"></script>
<script>
(function () {
    const PALETTE = ['#E85D26','#16A34A','#7C3AED','#DB2777','#0284C7','#CA8A04'];
    function colorFor(name){let h=0;for(const c of (name||''))h=(h*31+c.charCodeAt(0))&0xFFFF;return PALETTE[h%PALETTE.length];}
    function initials(name){return (name||'A').trim().split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2);}
    function fmtDate(iso){try{return new Date(iso).toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'});}catch{return '';}}
    function escape(s){return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

    document.getElementById('sidebarToggle')?.addEventListener('click', () => {
        document.getElementById('sidebar').classList.toggle('open');
    });

    const me = window.SP && window.SP.user;
    if (me) {
        document.getElementById('adminAvatar').textContent = initials(me.username);
        document.getElementById('adminAvatar').style.background = colorFor(me.username);
        document.getElementById('adminName').textContent  = me.username;
        document.getElementById('adminEmail').textContent = me.email;
    }

    let allUsers = [];
    let activeFilter = 'all';
    let searchQuery = '';

    function toast(msg, type = 'success') {
        const el = document.createElement('div');
        const color = type === 'success' ? 'bg-green-600 text-white' : type === 'error' ? 'bg-red-600 text-white' : 'bg-slate-800 text-white';
        el.className = 'toast ' + color;
        el.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="${type==='success' ? 'M5 13l4 4L19 7' : 'M6 18L18 6M6 6l12 12'}"/></svg> ${escape(msg)}`;
        document.getElementById('toastContainer').appendChild(el);
        setTimeout(() => { el.style.opacity = '0'; el.style.transform = 'translateX(20px)'; el.style.transition = 'all .25s'; }, 2500);
        setTimeout(() => el.remove(), 2800);
    }

    function confirmAction({ title, msg, btnClass, btnLabel }) {
        return new Promise(resolve => {
            const modal = document.getElementById('confirmModal');
            document.getElementById('confirmTitle').textContent = title;
            document.getElementById('confirmMsg').textContent   = msg;
            const ok = document.getElementById('confirmOk');
            ok.textContent = btnLabel;
            ok.className = 'px-4 py-2 rounded-lg text-sm font-semibold text-white ' + btnClass;
            modal.classList.remove('hidden');
            const cleanup = (val) => {
                modal.classList.add('hidden');
                ok.removeEventListener('click', onOk);
                document.getElementById('confirmCancel').removeEventListener('click', onCancel);
                resolve(val);
            };
            const onOk = () => cleanup(true);
            const onCancel = () => cleanup(false);
            ok.addEventListener('click', onOk);
            document.getElementById('confirmCancel').addEventListener('click', onCancel);
        });
    }

    function userRow(u) {
        const isMe = me && u.id == me.id;
        const avatarBg = colorFor(u.username);
        const inits = initials(u.username);
        const roleBadge = u.role === 'admin' ? '<span class="badge-admin">Admin</span>' : '<span class="badge-user">Membre</span>';
        const activeBadge = u.is_active ? '<span class="badge-active">Actif</span>' : '<span class="badge-inactive">Désactivé</span>';

        const roleBtn = !isMe ? (
            u.role === 'admin'
                ? `<button data-id="${u.id}" data-role="user" class="js-role px-2.5 py-1 bg-blue-50 text-blue-700 border border-blue-200 rounded-md text-xs font-semibold hover:bg-blue-100">Rétrograder</button>`
                : `<button data-id="${u.id}" data-role="admin" class="js-role px-2.5 py-1 bg-purple-50 text-purple-700 border border-purple-200 rounded-md text-xs font-semibold hover:bg-purple-100">Promouvoir admin</button>`
        ) : '';

        const toggleBtn = !isMe ? `<button data-id="${u.id}" class="js-toggle px-2.5 py-1 bg-slate-50 text-slate-700 border border-slate-200 rounded-md text-xs font-semibold hover:bg-slate-100">${u.is_active ? 'Désactiver' : 'Réactiver'}</button>` : '';

        const deleteBtn = !isMe ? `<button data-id="${u.id}" data-name="${escape(u.username)}" class="js-delete px-2.5 py-1 bg-red-50 text-red-600 border border-red-200 rounded-md text-xs font-semibold hover:bg-red-100">Supprimer</button>` : '';

        return `
        <tr class="user-row" data-row-id="${u.id}">
            <td class="px-4 py-3">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 rounded-full flex items-center justify-center text-white font-bold text-xs flex-shrink-0" style="background:${avatarBg}">${inits}</div>
                    <div class="min-w-0">
                        <p class="font-semibold text-slate-900 truncate">${escape(u.username)}${isMe ? ' <span class="text-xs text-slate-400 font-normal">(vous)</span>' : ''}</p>
                        <p class="text-xs text-slate-500 truncate md:hidden">${escape(u.email)}</p>
                    </div>
                </div>
            </td>
            <td class="px-4 py-3 hidden md:table-cell text-slate-700 truncate">${escape(u.email)}</td>
            <td class="px-4 py-3 hidden lg:table-cell text-slate-500 text-xs">${fmtDate(u.created_at)}</td>
            <td class="px-4 py-3 text-center">
                <span class="font-semibold">${u.published_count}</span>
                ${u.pending_count > 0 ? `<span class="text-xs text-amber-600 ml-1">+${u.pending_count} pending</span>` : ''}
            </td>
            <td class="px-4 py-3">${roleBadge}</td>
            <td class="px-4 py-3">${activeBadge}</td>
            <td class="px-4 py-3 text-right">
                <div class="inline-flex flex-wrap gap-1.5 justify-end">
                    ${roleBtn}${toggleBtn}${deleteBtn}
                </div>
            </td>
        </tr>`;
    }

    function getFiltered() {
        let list = allUsers.slice();
        if (activeFilter === 'admin')    list = list.filter(u => u.role === 'admin');
        else if (activeFilter === 'user')    list = list.filter(u => u.role === 'user');
        else if (activeFilter === 'inactive') list = list.filter(u => !u.is_active);
        if (searchQuery.trim()) {
            const q = searchQuery.trim().toLowerCase();
            list = list.filter(u => (u.username||'').toLowerCase().includes(q) || (u.email||'').toLowerCase().includes(q));
        }
        return list;
    }

    function render() {
        const tbody = document.getElementById('usersBody');
        const list  = getFiltered();
        if (list.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="px-4 py-12 text-center text-slate-400">Aucun utilisateur.</td></tr>';
        } else {
            tbody.innerHTML = list.map(userRow).join('');
            tbody.querySelectorAll('.js-role').forEach(b => b.addEventListener('click', () => changeRole(+b.dataset.id, b.dataset.role)));
            tbody.querySelectorAll('.js-toggle').forEach(b => b.addEventListener('click', () => toggleActive(+b.dataset.id)));
            tbody.querySelectorAll('.js-delete').forEach(b => b.addEventListener('click', () => deleteUser(+b.dataset.id, b.dataset.name)));
        }
        const counts = {
            all: allUsers.length,
            admin: allUsers.filter(u => u.role === 'admin').length,
            user:  allUsers.filter(u => u.role === 'user').length,
            inactive: allUsers.filter(u => !u.is_active).length,
        };
        document.querySelectorAll('[data-count]').forEach(el => el.textContent = counts[el.dataset.count]);
        document.getElementById('totalCount').textContent = counts.all;
        document.querySelectorAll('.filter-btn').forEach(b => {
            const isActive = b.dataset.filter === activeFilter;
            b.classList.toggle('active', isActive);
            if (isActive) {
                b.classList.add('bg-sp', 'text-white');
                b.classList.remove('bg-white', 'border', 'border-slate-200', 'text-slate-600');
            } else {
                b.classList.remove('bg-sp', 'text-white');
                b.classList.add('bg-white', 'border', 'border-slate-200', 'text-slate-600');
            }
        });
    }

    async function loadUsers() {
        try {
            const res = await fetch('../api/users.php?action=list', { credentials: 'include' });
            const data = await res.json();
            if (data.error) throw new Error(data.error);
            allUsers = data.users || [];
            render();
        } catch (e) {
            document.getElementById('usersBody').innerHTML = `<tr><td colspan="7" class="px-4 py-12 text-center text-red-500">Erreur: ${escape(e.message)}</td></tr>`;
        }
    }

    async function changeRole(id, newRole) {
        const u = allUsers.find(x => x.id == id);
        const ok = await confirmAction({
            title: newRole === 'admin' ? 'Promouvoir en admin' : 'Rétrograder en membre',
            msg: `${u?.username} ${newRole === 'admin' ? 'aura accès à l\'espace administrateur.' : 'perdra l\'accès à l\'espace administrateur.'}`,
            btnClass: newRole === 'admin' ? 'bg-purple-600 hover:bg-purple-700' : 'bg-blue-600 hover:bg-blue-700',
            btnLabel: 'Confirmer',
        });
        if (!ok) return;
        try {
            const res = await fetch('../api/users.php?action=role&id=' + id, {
                method: 'POST', credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ role: newRole })
            });
            const d = await res.json();
            if (!d.success) throw new Error(d.error || 'Erreur');
            toast('Rôle mis à jour', 'success');
            await loadUsers();
        } catch (e) { toast(e.message, 'error'); }
    }

    async function toggleActive(id) {
        const u = allUsers.find(x => x.id == id);
        const becomeActive = !u.is_active;
        const ok = await confirmAction({
            title: becomeActive ? 'Réactiver le compte' : 'Désactiver le compte',
            msg: `${u?.username} ${becomeActive ? 'pourra à nouveau se connecter.' : 'ne pourra plus se connecter mais ses recettes restent en ligne.'}`,
            btnClass: becomeActive ? 'bg-green-600 hover:bg-green-700' : 'bg-amber-600 hover:bg-amber-700',
            btnLabel: becomeActive ? 'Réactiver' : 'Désactiver',
        });
        if (!ok) return;
        try {
            const res = await fetch('../api/users.php?action=toggle_active&id=' + id, { method: 'POST', credentials: 'include' });
            const d = await res.json();
            if (!d.success) throw new Error(d.error || 'Erreur');
            toast(becomeActive ? 'Compte réactivé' : 'Compte désactivé', 'success');
            await loadUsers();
        } catch (e) { toast(e.message, 'error'); }
    }

    async function deleteUser(id, name) {
        const ok = await confirmAction({
            title: 'Supprimer définitivement',
            msg: `${name} sera supprimé(e) avec toutes ses recettes. Action irréversible.`,
            btnClass: 'bg-red-700 hover:bg-red-800',
            btnLabel: 'Supprimer',
        });
        if (!ok) return;
        try {
            const res = await fetch('../api/users.php?action=delete&id=' + id, { method: 'DELETE', credentials: 'include' });
            const d = await res.json();
            if (!d.success) throw new Error(d.error || 'Erreur');
            toast('Utilisateur supprimé', 'success');
            await loadUsers();
        } catch (e) { toast(e.message, 'error'); }
    }

    document.querySelectorAll('.filter-btn').forEach(b => b.addEventListener('click', () => {
        activeFilter = b.dataset.filter;
        render();
    }));

    let searchTimer;
    document.getElementById('searchInput').addEventListener('input', function () {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => { searchQuery = this.value; render(); }, 200);
    });

    loadUsers();
})();
</script>

</body>
</html>
