name: Deploy to o2switch

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Tailwind CSS
        run: |
          npm install --no-audit --no-fund
          npm run build:css

      - name: Generate DB config
        env:
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
        run: |
          printf '<?php\ndefine("DB_HOST","localhost");\ndefine("DB_NAME","%s");\ndefine("DB_USER","%s");\ndefine("DB_PASS","%s");\n' \
            "$DB_NAME" "$DB_USER" "$DB_PASS" > api/db_config.php

      - name: Ensure remote dirs + reset sync state
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          python3 <<'PYEOF'
          import os, ssl, ftplib
          ctx = ssl.create_default_context()
          ctx.check_hostname = False
          ctx.verify_mode = ssl.CERT_NONE
          ftp = ftplib.FTP_TLS('ftp.gupi3719.odns.fr', context=ctx)
          ftp.login('deploy@gupi3719.odns.fr', os.environ['FTP_PASSWORD'])
          ftp.prot_p()
          dirs = ['js', 'css', 'admin', 'api', 'assets', 'assets/recipes', 'uploads', 'uploads/recipes']
          for d in dirs:
              try:
                  ftp.mkd(d)
                  print(f'[mkdir] Created {d}/')
              except ftplib.error_perm as e:
                  print(f'[mkdir] {d}/ skipped: {e}')
          for f in ['.ftp-deploy-sync-state.json', 'css/sp.css']:
              try:
                  ftp.delete(f)
                  print(f'[clean] Removed {f}')
              except ftplib.error_perm:
                  print(f'[clean] {f} not present')
          ftp.quit()
          PYEOF

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ftp.gupi3719.odns.fr
          username: deploy@gupi3719.odns.fr
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          server-dir: ./
          log-level: verbose
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.DS_Store
            **/package.json
            **/package-lock.json
            **/tailwind.config.js
            **/css/input.css
            **/migrate-tailwind.js
            **/css/tailwind.css
