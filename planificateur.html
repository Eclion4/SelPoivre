    <script>
    (function () {
        'use strict';

        // ── Auth guard ────────────────────────────────────────────────
        if (!window.SP || !window.SP.user) {
            window.location.href = 'connexion.html';
            return;
        }

        // ── Constants ─────────────────────────────────────────────────
        const DAYS = ['Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam', 'Dim'];
        const MEAL_TYPES = [
            { key: 'petit-dejeuner', label: 'Petit-déj',  emoji: '☀️' },
            { key: 'dejeuner',       label: 'Déjeuner',   emoji: '🍽️' },
            { key: 'diner',          label: 'Dîner',      emoji: '🌙' },
            { key: 'snack',          label: 'Snack',      emoji: '🍎' },
        ];
        const FR_MONTHS = ['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];
        const FR_MONTHS_LONG = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];

        // ── State ─────────────────────────────────────────────────────
        let currentMonday = getThisMonday();
        let planData = {};   // { 'YYYY-MM-DD': { 'petit-dejeuner': [...], ... } }
        let pendingSlot = null;  // { date, mealType }
        let selectedRecipe = null;
        let portions = 2;
        let searchTimer = null;

        // ── Utils ─────────────────────────────────────────────────────
        function getThisMonday() {
            const d = new Date();
            d.setHours(0, 0, 0, 0);
            const day = d.getDay(); // 0=Sun
            const diff = day === 0 ? -6 : 1 - day;
            d.setDate(d.getDate() + diff);
            return d;
        }
        function addDays(date, n) {
            const d = new Date(date);
            d.setDate(d.getDate() + n);
            return d;
        }
        function toYMD(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }
        function formatShort(date) {
            return `${String(date.getDate()).padStart(2,'0')} ${FR_MONTHS[date.getMonth()]}`;
        }
        function formatLong(date) {
            return `${date.getDate()} ${FR_MONTHS_LONG[date.getMonth()]} ${date.getFullYear()}`;
        }
        function escHtml(s) {
            if (!s) return '';
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }
        function fmtTime(min) {
            if (!min) return '';
            if (min < 60) return min + ' min';
            const h = Math.floor(min / 60), m = min % 60;
            return m ? h + 'h' + String(m).padStart(2, '0') : h + 'h';
        }
        function showToast(msg, duration = 2800) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), duration);
        }

        // ── Week label ────────────────────────────────────────────────
        function updateWeekLabel() {
            const sunday = addDays(currentMonday, 6);
            document.getElementById('weekLabel').textContent =
                `Semaine du Lun ${formatShort(currentMonday)} au Dim ${formatShort(sunday)}`;
        }

        // ── Fetch week data ───────────────────────────────────────────
        async function loadWeek() {
            const weekStart = toYMD(currentMonday);
            planData = {};
            try {
                const res = await fetch(window.SP.apiPath(`meal-plan.php?action=week&week=${weekStart}`), { credentials: 'include' });
                if (res.status === 401) { window.location.href = 'connexion.html'; return; }
                const data = await res.json();
                if (data.entries && Array.isArray(data.entries)) {
                    data.entries.forEach(entry => {
                        const d = entry.plan_date;
                        const m = entry.meal_type;
                        if (!planData[d]) planData[d] = {};
                        if (!planData[d][m]) planData[d][m] = [];
                        planData[d][m].push(entry);
                    });
                }
            } catch (e) {
                console.error('Erreur chargement planning', e);
            }
            render();
        }

        // ── Build a recipe mini card (HTML string) ────────────────────
        function buildCard(entry) {
            const img = entry.image_url || 'assets/recipes/_default.jpg';
            return `
            <div class="plan-card" data-entry-id="${entry.id}">
                <button class="plan-card-remove" data-id="${entry.id}" aria-label="Supprimer">
                    <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
                </button>
                <img src="${escHtml(img)}" alt="${escHtml(entry.recipe_title || '')}" loading="lazy">
                <div class="plan-card-body">
                    <div class="plan-card-title">${escHtml(entry.recipe_title || 'Recette')}</div>
                    <div class="plan-card-portions">${entry.servings} portion${entry.servings > 1 ? 's' : ''}</div>
                </div>
            </div>`;
        }

        // ── Build empty cell ──────────────────────────────────────────
        function buildEmptyCell(date, mealType) {
            return `
            <div class="plan-cell-empty">
                <button class="plan-cell-add-btn" data-date="${date}" data-meal="${mealType}" aria-label="Ajouter une recette">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
                </button>
            </div>`;
        }

        // ── Desktop render ────────────────────────────────────────────
        function renderDesktop() {
            const grid = document.getElementById('plannerGrid');
            if (!grid) return;

            let html = '';

            // Row 0 — headers
            html += '<div></div>'; // corner
            DAYS.forEach((day, i) => {
                const date = addDays(currentMonday, i);
                html += `<div class="planner-grid-header">${escHtml(day)}<br><span style="font-size:.7rem;font-weight:400;opacity:.7">${formatShort(date)}</span></div>`;
            });

            // Rows 1-4 — meal types
            MEAL_TYPES.forEach(meal => {
                // Label cell
                html += `<div class="planner-grid-label"><span class="meal-emoji">${meal.emoji}</span>${escHtml(meal.label)}</div>`;

                // Day cells
                for (let i = 0; i < 7; i++) {
                    const date = toYMD(addDays(currentMonday, i));
                    const entries = (planData[date] && planData[date][meal.key]) || [];
                    if (entries.length > 0) {
                        html += `<div class="plan-cell-filled" data-date="${date}" data-meal="${meal.key}">`;
                        entries.forEach(e => { html += buildCard(e); });
                        html += `</div>`;
                    } else {
                        html += buildEmptyCell(date, meal.key);
                    }
                }
            });

            grid.innerHTML = html;
            bindGridEvents(grid);
        }

        // ── Mobile render ─────────────────────────────────────────────
        function renderMobile() {
            const list = document.getElementById('mobileList');
            if (!list) return;

            let html = '';
            DAYS.forEach((day, i) => {
                const date = addDays(currentMonday, i);
                const ymd = toYMD(date);
                const dayLabel = `${day} ${formatShort(date)}`;

                html += `<div class="mobile-day">
                    <div class="mobile-day-header" data-day="${i}">
                        <span>${escHtml(dayLabel)}</span>
                        <svg class="chevron" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
                    </div>
                    <div class="mobile-day-body" data-daybody="${i}">`;

                MEAL_TYPES.forEach(meal => {
                    const entries = (planData[ymd] && planData[ymd][meal.key]) || [];
                    html += `<div class="mobile-meal-row">
                        <div class="mobile-meal-label" style="gap:6px;">${meal.emoji} <span style="margin-left:4px;">${escHtml(meal.label)}</span></div>`;

                    if (entries.length > 0) {
                        entries.forEach(e => { html += buildCard(e); });
                    } else {
                        html += buildEmptyCell(ymd, meal.key);
                    }
                    html += `</div>`;
                });

                html += `</div></div>`;
            });

            list.innerHTML = html;

            // Day toggle
            list.querySelectorAll('.mobile-day-header').forEach(hdr => {
                hdr.addEventListener('click', () => {
                    const idx = hdr.dataset.day;
                    const body = list.querySelector(`.mobile-day-body[data-daybody="${idx}"]`);
                    if (!body) return;
                    const open = body.classList.toggle('open');
                    hdr.classList.toggle('open', open);
                });
            });

            bindGridEvents(list);
        }

        // ── Bind add/remove buttons ───────────────────────────────────
        function bindGridEvents(container) {
            container.querySelectorAll('.plan-cell-add-btn').forEach(btn => {
                btn.addEventListener('click', () => openAddModal(btn.dataset.date, btn.dataset.meal));
            });
            container.querySelectorAll('.plan-card-remove').forEach(btn => {
                btn.addEventListener('click', () => removeEntry(+btn.dataset.id));
            });
        }

        // ── Full render ───────────────────────────────────────────────
        function render() {
            renderDesktop();
            renderMobile();
            if (window.lucide) lucide.createIcons();
        }

        // ── Remove entry ──────────────────────────────────────────────
        async function removeEntry(id) {
            // Optimistic UI
            for (const date in planData) {
                for (const meal in planData[date]) {
                    planData[date][meal] = planData[date][meal].filter(e => e.id !== id);
                }
            }
            render();

            try {
                await fetch(window.SP.apiPath('meal-plan.php?action=remove'), {
                    method: 'DELETE',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id }),
                });
            } catch (e) {
                showToast('Erreur lors de la suppression.');
                loadWeek(); // reload to get consistent state
            }
        }

        // ── Week navigation ───────────────────────────────────────────
        document.getElementById('prevWeekBtn').addEventListener('click', () => {
            currentMonday = addDays(currentMonday, -7);
            updateWeekLabel();
            loadWeek();
        });
        document.getElementById('nextWeekBtn').addEventListener('click', () => {
            currentMonday = addDays(currentMonday, 7);
            updateWeekLabel();
            loadWeek();
        });

        // ── Generate shopping list ────────────────────────────────────
        document.getElementById('generateBtn').addEventListener('click', async () => {
            const btn = document.getElementById('generateBtn');
            if (btn.classList.contains('loading')) return;
            btn.classList.add('loading');
            btn.setAttribute('disabled', 'true');
            try {
                const res = await fetch(window.SP.apiPath('meal-plan.php?action=generate_list'), {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ week_start: toYMD(currentMonday) }),
                });
                const data = await res.json();
                if (!res.ok || !data.success) throw new Error(data.error || 'Erreur lors de la génération.');
                window.location.href = 'liste-courses.html';
            } catch (e) {
                showToast('Erreur : ' + e.message, 4000);
                btn.classList.remove('loading');
                btn.removeAttribute('disabled');
            }
        });

        // ── Modal state ───────────────────────────────────────────────
        function openAddModal(date, mealType) {
            pendingSlot = { date, mealType };
            selectedRecipe = null;
            portions = 2;

            const meal = MEAL_TYPES.find(m => m.key === mealType);
            const dateObj = new Date(date + 'T00:00:00');
            const dayName = DAYS[dateObj.getDay() === 0 ? 6 : dateObj.getDay() - 1];

            document.getElementById('slotLabel').textContent =
                `${dayName} ${formatShort(dateObj)} — ${meal ? meal.label : mealType}`;

            document.getElementById('recipeSearchInput').value = '';
            document.getElementById('portionsVal').textContent = '2';
            document.getElementById('confirmAddBtn').disabled = true;
            document.getElementById('modalError').classList.add('hidden');
            document.getElementById('searchResults').innerHTML =
                '<p class="text-sm text-gray-400 text-center py-6">Tapez pour rechercher une recette…</p>';

            document.getElementById('addModal').style.display = 'flex';
            setTimeout(() => document.getElementById('recipeSearchInput').focus(), 80);
            if (window.lucide) lucide.createIcons();
        }
        function closeAddModal() {
            document.getElementById('addModal').style.display = 'none';
            pendingSlot = null;
            selectedRecipe = null;
        }

        document.getElementById('closeModalBtn').addEventListener('click', closeAddModal);
        document.getElementById('cancelModalBtn').addEventListener('click', closeAddModal);
        document.getElementById('addModal').addEventListener('click', e => {
            if (e.target === document.getElementById('addModal')) closeAddModal();
        });
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape' && document.getElementById('addModal').style.display !== 'none') closeAddModal();
        });

        // ── Portions ──────────────────────────────────────────────────
        document.getElementById('portionsDown').addEventListener('click', () => {
            if (portions > 1) { portions--; document.getElementById('portionsVal').textContent = portions; }
        });
        document.getElementById('portionsUp').addEventListener('click', () => {
            if (portions < 8) { portions++; document.getElementById('portionsVal').textContent = portions; }
        });

        // ── Recipe search (debounced) ─────────────────────────────────
        document.getElementById('recipeSearchInput').addEventListener('input', function () {
            clearTimeout(searchTimer);
            const q = this.value.trim();
            if (!q) {
                document.getElementById('searchResults').innerHTML =
                    '<p class="text-sm text-gray-400 text-center py-6">Tapez pour rechercher une recette…</p>';
                selectedRecipe = null;
                document.getElementById('confirmAddBtn').disabled = true;
                return;
            }
            document.getElementById('searchResults').innerHTML =
                '<p class="text-sm text-gray-400 text-center py-4 animate-spin inline-block">…</p>';
            searchTimer = setTimeout(() => searchRecipes(q), 400);
        });

        async function searchRecipes(q) {
            try {
                const res = await fetch(
                    window.SP.apiPath('recipes.php?action=list&search=') + encodeURIComponent(q) + '&limit=5',
                    { credentials: 'include' }
                );
                const data = await res.json();
                const recipes = (data.recipes || []).slice(0, 5);
                renderSearchResults(recipes);
            } catch {
                document.getElementById('searchResults').innerHTML =
                    '<p class="text-sm text-red-500 text-center py-4">Erreur de recherche.</p>';
            }
        }

        function renderSearchResults(recipes) {
            const box = document.getElementById('searchResults');
            if (recipes.length === 0) {
                box.innerHTML = '<p class="text-sm text-gray-400 text-center py-6">Aucune recette trouvée.</p>';
                return;
            }
            box.innerHTML = recipes.map(r => {
                const img = r.image_url || 'assets/recipes/_default.jpg';
                const time = fmtTime(r.total_time);
                const diff = r.difficulty || '';
                const meta = [diff, time].filter(Boolean).join(' · ');
                return `<div class="recipe-result" data-id="${r.id}" data-slug="${escHtml(r.slug)}" data-title="${escHtml(r.title)}" data-img="${escHtml(img)}">
                    <img src="${escHtml(img)}" alt="${escHtml(r.title)}" onerror="this.src='assets/recipes/_default.jpg'">
                    <div class="recipe-result-info">
                        <div class="recipe-result-title">${escHtml(r.title)}</div>
                        ${meta ? `<div class="recipe-result-meta">${escHtml(meta)}</div>` : ''}
                    </div>
                </div>`;
            }).join('');

            box.querySelectorAll('.recipe-result').forEach(el => {
                el.addEventListener('click', () => {
                    box.querySelectorAll('.recipe-result').forEach(x => x.classList.remove('selected'));
                    el.classList.add('selected');
                    selectedRecipe = {
                        id: +el.dataset.id,
                        slug: el.dataset.slug,
                        title: el.dataset.title,
                        image_url: el.dataset.img,
                    };
                    document.getElementById('confirmAddBtn').disabled = false;
                });
            });
        }

        // ── Confirm add ───────────────────────────────────────────────
        document.getElementById('confirmAddBtn').addEventListener('click', async () => {
            if (!selectedRecipe || !pendingSlot) return;
            const btn = document.getElementById('confirmAddBtn');
            const errBox = document.getElementById('modalError');
            errBox.classList.add('hidden');
            btn.disabled = true;
            btn.innerHTML = `<svg class="animate-spin" style="width:16px;height:16px;" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12a9 9 0 11-6.219-8.56"/></svg>`;

            try {
                const res = await fetch(window.SP.apiPath('meal-plan.php?action=add'), {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        recipe_id: selectedRecipe.id,
                        plan_date: pendingSlot.date,
                        meal_type: pendingSlot.mealType,
                        servings: portions,
                    }),
                });
                const data = await res.json();
                if (!res.ok || !data.success) throw new Error(data.error || 'Erreur lors de l\'ajout.');

                // Update local state
                const entry = data.entry || {
                    id: data.id || Date.now(),
                    recipe_id: selectedRecipe.id,
                    recipe_title: selectedRecipe.title,
                    image_url: selectedRecipe.image_url,
                    plan_date: pendingSlot.date,
                    meal_type: pendingSlot.mealType,
                    servings: portions,
                };
                const d = pendingSlot.date;
                const m = pendingSlot.mealType;
                if (!planData[d]) planData[d] = {};
                if (!planData[d][m]) planData[d][m] = [];
                planData[d][m].push(entry);

                closeAddModal();
                render();
                showToast('Recette ajoutée au planning ✓');
            } catch (e) {
                errBox.textContent = e.message;
                errBox.classList.remove('hidden');
                btn.disabled = false;
                btn.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg> Ajouter`;
            }
        });

        // ── Mobile menu toggle ────────────────────────────────────────
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const mobileMenu    = document.getElementById('mobileMenu');
        if (mobileMenuBtn && mobileMenu) {
            mobileMenuBtn.addEventListener('click', () => {
                const opened = mobileMenu.classList.toggle('hidden') === false;
                mobileMenuBtn.setAttribute('aria-expanded', String(opened));
            });
        }

        // ── Init ──────────────────────────────────────────────────────
        updateWeekLabel();
        loadWeek();
        if (window.lucide) lucide.createIcons();

    })();
    </script>
    <script src="js/consent.js"></script>
</body>
</html>
