<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Migration BDD — Sel & Poivre</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 80px auto; text-align: center; }
        button { padding: 14px 32px; background: #C4311B; color: white; border: none;
                 border-radius: 8px; font-size: 16px; cursor: pointer; }
        #result { margin-top: 20px; font-size: 15px; }
    </style>
</head>
<body>
    <h2>Migration base de données</h2>
    <p>Ajoute la colonne <code>preferences</code> à la table <code>users</code>.</p>
    <button onclick="runMigration()">Lancer la migration</button>
    <div id="result"></div>
    <script>
    async function runMigration() {
        document.getElementById('result').textContent = 'Migration en cours...';
        try {
            const res = await fetch('api/migrate.php', { method: 'POST' });
            const data = await res.json();
            document.getElementById('result').innerHTML = data.results
                .map(r => `${r.status === 'ok' ? '✅' : '❌'} <strong>${r.migration}</strong>${r.message ? ' — ' + r.message : ''}`)
                .join('<br>');
        } catch (e) {
            document.getElementById('result').textContent = 'Erreur : ' + e.message;
        }
    }
    </script>
</body>
</html>
