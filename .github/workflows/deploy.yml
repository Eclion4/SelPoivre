name: Deploy to o2switch

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate DB config
        env:
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          MIGRATION_KEY: ${{ secrets.MIGRATION_KEY }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          BREVO_LIST_ID: ${{ secrets.BREVO_LIST_ID }}
        run: |
          {
            printf '<?php\n'
            printf 'define("DB_HOST","localhost");\n'
            printf 'define("DB_NAME","%s");\n'   "$DB_NAME"
            printf 'define("DB_USER","%s");\n'   "$DB_USER"
            printf 'define("DB_PASS","%s");\n'   "$DB_PASS"
            [ -n "$MIGRATION_KEY"  ] && printf 'define("MIGRATION_KEY","%s");\n'  "$MIGRATION_KEY"
            [ -n "$BREVO_API_KEY"  ] && printf 'define("BREVO_API_KEY","%s");\n'  "$BREVO_API_KEY"
            [ -n "$BREVO_LIST_ID"  ] && printf 'define("BREVO_LIST_ID",%s);\n'    "$BREVO_LIST_ID"
          } > api/db_config.php

      - name: Ensure remote dirs + reset sync state
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          python3 <<'PYEOF'
          import os, ssl, ftplib
          ctx = ssl.create_default_context()
          ctx.check_hostname = False
          ctx.verify_mode = ssl.CERT_NONE
          ftp = ftplib.FTP_TLS('ftp.gupi3719.odns.fr', context=ctx)
          ftp.login('deploy@gupi3719.odns.fr', os.environ['FTP_PASSWORD'])
          ftp.prot_p()
          dirs = ['js', 'css', 'admin', 'api', 'assets', 'assets/recipes', 'uploads', 'uploads/recipes']
          for d in dirs:
              try:
                  ftp.mkd(d)
                  print(f'[mkdir] Created {d}/')
              except ftplib.error_perm as e:
                  print(f'[mkdir] {d}/ skipped: {e}')
          for f in ['.ftp-deploy-sync-state.json']:
              try:
                  ftp.delete(f)
                  print(f'[clean] Removed {f}')
              except ftplib.error_perm:
                  print(f'[clean] {f} not present')
          ftp.quit()
          PYEOF

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ftp.gupi3719.odns.fr
          username: deploy@gupi3719.odns.fr
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          server-dir: ./
          log-level: verbose
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.DS_Store
            **/package.json
            **/package-lock.json
            **/tailwind.config.js
            **/css/input.css
            **/migrate-tailwind.js
            **/css/tailwind.css
