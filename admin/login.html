<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <title>Accès Administration — Sel & Poivre</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 'body': ['Inter','sans-serif'], 'display': ['Playfair Display','serif'], 'mono': ['JetBrains Mono','monospace'] },
                    colors: { 'sp': { 500:'#C4311B',600:'#A42618' }, 'admin': { 900:'#0F172A',800:'#1E293B',700:'#334155',600:'#475569',400:'#94A3B8',200:'#E2E8F0' } }
                }
            }
        }
    </script>
    <style>
        body { background: #0F172A; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30,41,59,0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.06); }
        .input-admin { width:100%; padding:12px 16px 12px 44px; background:#0F172A; border:1px solid #334155; border-radius:10px; color:#F1F5F9; font-size:0.9375rem; outline:none; transition:all 0.2s; }
        .input-admin:focus { border-color:#F97316; box-shadow:0 0 0 3px rgba(249,115,22,0.15); }
        .input-admin::placeholder { color:#475569; }
        .input-icon { position:absolute; left:13px; top:50%; transform:translateY(-50%); width:18px; height:18px; color:#475569; pointer-events:none; transition:color 0.2s; }
        .input-wrapper:focus-within .input-icon { color:#F97316; }
        .btn-primary { width:100%; padding:13px; background:linear-gradient(135deg,#F97316,#EA580C); color:white; border-radius:10px; font-weight:600; transition:all 0.2s; cursor:pointer; border:none; font-size:0.9375rem; }
        .btn-primary:hover { transform:translateY(-1px); box-shadow:0 8px 25px rgba(249,115,22,0.35); }
        .btn-primary:disabled { opacity:0.5; transform:none; cursor:not-allowed; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
        .fade-up { animation: fadeUp 0.4s ease forwards; }
        .shake { animation: shake 0.4s ease; }
        .alert-error { background:#1A0A0A; border:1px solid #EF4444; border-radius:10px; padding:12px 16px; color:#FCA5A5; font-size:0.875rem; display:none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { animation: spin 0.8s linear infinite; }
        .badge-secure { display:inline-flex; align-items:center; gap:6px; padding:4px 10px; background:rgba(34,197,94,0.1); border:1px solid rgba(34,197,94,0.2); border-radius:9999px; color:#4ADE80; font-size:0.75rem; font-weight:500; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="fixed inset-0 opacity-5" style="background-image:radial-gradient(#F97316 1px,transparent 1px);background-size:32px 32px;"></div>
    <div class="fixed top-0 left-1/2 -translate-x-1/2 w-96 h-96 bg-orange-500/5 rounded-full blur-3xl pointer-events-none"></div>

    <div class="w-full max-w-md relative z-10">

        <div class="text-center mb-8 fade-up">
            <a href="../index.html" class="inline-flex items-center gap-2 mb-6 group">
                <div class="w-10 h-10 bg-gradient-to-br from-orange-500 to-orange-600 rounded-xl flex items-center justify-center group-hover:scale-110 transition-transform">
                    <svg width="22" height="22" fill="white" viewBox="0 0 24 24"><path d="M12 2C8.5 2 5.5 4.5 5.5 8c0 2.5 1.5 4.5 3.5 5.5V22h6v-8.5c2-1 3.5-3 3.5-5.5 0-3.5-3-6-6.5-6z"/></svg>
                </div>
                <span class="text-xl font-display font-bold text-white">Sel &amp; Poivre <span class="text-orange-500">Admin</span></span>
            </a>
            <div class="badge-secure mx-auto">
                <svg width="12" height="12" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/></svg>
                Connexion sécurisée
            </div>
        </div>

        <div class="glass rounded-2xl p-8 fade-up">
            <h1 class="text-xl font-bold text-white mb-1">Accès administrateur</h1>
            <p class="text-admin-400 text-sm mb-6">Réservé aux comptes ayant le rôle administrateur.</p>

            <div id="errorBox" class="alert-error mb-4">
                <span id="errorMsg">Identifiants incorrects.</span>
            </div>

            <form id="loginForm" novalidate>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-admin-200 mb-1.5">Email</label>
                        <div class="input-wrapper relative">
                            <svg class="input-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                            <input type="email" id="adminEmail" class="input-admin" placeholder="vous@exemple.com" autocomplete="username" required>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-admin-200 mb-1.5">Mot de passe</label>
                        <div class="input-wrapper relative">
                            <svg class="input-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                            <input type="password" id="adminPassword" class="input-admin" placeholder="••••••••••" autocomplete="current-password" required>
                            <button type="button" onclick="togglePwd()" class="absolute right-3 top-1/2 -translate-y-1/2 text-admin-600 hover:text-admin-400 transition-colors p-1">
                                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                    </div>
                </div>
                <button type="button" onclick="submitLogin()" id="submitBtn" class="btn-primary mt-6">
                    Se connecter
                </button>
            </form>

            <div class="mt-6 pt-6 border-t border-admin-700 text-center text-xs text-admin-600">
                <a href="../connexion.html" class="hover:text-admin-400 transition-colors">Connexion utilisateur standard</a>
            </div>
        </div>

        <p class="text-center text-xs text-admin-700 mt-6">
            <a href="../index.html" class="hover:text-admin-500 transition-colors">Retour au site</a>
        </p>
    </div>

    <script>
    function showError(msg) {
        document.getElementById('errorMsg').textContent = msg;
        document.getElementById('errorBox').style.display = 'block';
        document.getElementById('loginForm').classList.add('shake');
        setTimeout(() => document.getElementById('loginForm').classList.remove('shake'), 400);
    }

    async function submitLogin() {
        const email = document.getElementById('adminEmail').value.trim();
        const pwd   = document.getElementById('adminPassword').value;
        const btn   = document.getElementById('submitBtn');

        if (!email || !pwd) { showError('Email et mot de passe requis.'); return; }

        btn.disabled = true;
        btn.innerHTML = '<svg class="spinner inline w-5 h-5 mr-2" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12a9 9 0 11-6.219-8.56"/></svg>Connexion...';

        try {
            const res = await fetch('../api/auth.php?action=login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ email, password: pwd })
            });
            const data = await res.json();

            if (!data.success) {
                showError(data.error || 'Identifiants incorrects.');
                btn.disabled = false;
                btn.textContent = 'Se connecter';
                return;
            }

            if (data.user.role !== 'admin') {
                showError('Ce compte n\'a pas les droits administrateur.');
                btn.disabled = false;
                btn.textContent = 'Se connecter';
                return;
            }

            localStorage.setItem('sp_user', JSON.stringify(data.user));
            window.location.href = 'index.html';
        } catch (e) {
            showError('Erreur réseau. Veuillez réessayer.');
            btn.disabled = false;
            btn.textContent = 'Se connecter';
        }
    }

    function togglePwd() {
        const i = document.getElementById('adminPassword');
        i.type = i.type === 'password' ? 'text' : 'password';
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'Enter') submitLogin();
    });
    </script>
</body>
</html>
